<!doctype html>
<html lang="en">
  <head>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.') {
          e.stopImmediatePropagation();
        }
      }, true);
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <!-- GSAP, ScrollTrigger, Lenis & particles.js CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  </head>
  <body>
    <!-- Fixed Interactive Plexus Network Background -->
    <div id="particles-js" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; background: transparent;"></div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" crossorigin="anonymous"></script>

    <script>
      window.addEventListener('DOMContentLoaded', (event) => {
        // Initialize Lenis Smooth Scroll
        if (typeof Lenis !== 'undefined') {
          const lenis = new Lenis({
            duration: 1.4,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // premium exponential easing
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 0.85, // gentler mouse speed for luxury gliding feel
            smoothTouch: false, // native touch on mobile for best UX
            touchMultiplier: 1.5,
          });

          window.lenis = lenis;

          // Sync ScrollTrigger with Lenis
          lenis.on('scroll', () => {
            if (typeof ScrollTrigger !== 'undefined') {
              ScrollTrigger.update();
            }
          });

          // Sync GSAP's ticker with Lenis requestAnimationFrame
          if (typeof gsap !== 'undefined') {
            gsap.ticker.add((time) => {
              lenis.raf(time * 1000);
            });
            gsap.ticker.lagSmoothing(0);
          } else {
            function raf(time) {
              lenis.raf(time);
              requestAnimationFrame(raf);
            }
            requestAnimationFrame(raf);
          }
        }

        function initParticles() {
          if (typeof particlesJS !== 'undefined') {
            particlesJS('particles-js', {
              "particles": {
                "number": {
                  "value": 55,
                  "density": {
                    "enable": true,
                    "value_area": 900
                  }
                },
                "color": {
                  "value": ["#00fff2", "#bc13fe", "#00f2ff"]
                },
                "shape": {
                  "type": "circle"
                },
                "opacity": {
                  "value": 0.35,
                  "random": true,
                  "anim": {
                    "enable": true,
                    "speed": 0.8,
                    "opacity_min": 0.1,
                    "sync": false
                  }
                },
                "size": {
                  "value": 3,
                  "random": true,
                  "anim": {
                    "enable": true,
                    "speed": 1.5,
                    "size_min": 0.5,
                    "sync": false
                  }
                },
                "line_linked": {
                  "enable": true,
                  "distance": 150,
                  "color": "#00fff2",
                  "opacity": 0.15,
                  "width": 1
                },
                "move": {
                  "enable": true,
                  "speed": 1.2,
                  "direction": "none",
                  "random": true,
                  "straight": false,
                  "out_mode": "out",
                  "bounce": false,
                  "attract": {
                    "enable": true,
                    "rotateX": 600,
                    "rotateY": 1200
                  }
                }
              },
              "interactivity": {
                "detect_on": "window",
                "events": {
                  "onhover": {
                    "enable": true,
                    "mode": ["grab", "repulse"]
                  },
                  "onclick": {
                    "enable": true,
                    "mode": "push"
                  },
                  "resize": true
                },
                "modes": {
                  "grab": {
                    "distance": 180,
                    "line_linked": {
                      "opacity": 0.4
                    }
                  },
                  "repulse": {
                    "distance": 150,
                    "duration": 0.4
                  },
                  "push": {
                    "particles_nb": 3
                  }
                }
              },
              "retina_detect": true
            });
          } else {
            setTimeout(initParticles, 150);
          }
        }
        initParticles();

        function initGSAPScrollReveals() {
          if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
            gsap.registerPlugin(ScrollTrigger);
            
            window.triggerCommandCenterAnimations = function() {
              gsap.utils.toArray('.gsap-reveal').forEach((elem) => {
                if (elem._gsapRevealed) return;
                elem._gsapRevealed = true;

                gsap.fromTo(elem, 
                  { opacity: 0, y: 30 }, 
                  {
                    opacity: 1,
                    y: 0,
                    duration: 0.8,
                    ease: "power2.out",
                    scrollTrigger: {
                      trigger: elem,
                      start: "top 88%",
                      toggleActions: "play none none none"
                    }
                  }
                );
              });
              
              gsap.utils.toArray('.glass-panel').forEach((panel) => {
                if (panel._gsapSweep) return;
                panel._gsapSweep = true;
                
                panel.addEventListener('mouseenter', () => {
                  gsap.to(panel, {
                    borderColor: 'rgba(0, 242, 255, 0.35)',
                    boxShadow: '0 0 20px rgba(188, 19, 254, 0.12)',
                    duration: 0.4
                  });
                });
                
                panel.addEventListener('mouseleave', () => {
                  gsap.to(panel, {
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    boxShadow: 'none',
                    duration: 0.4
                  });
                });
              });
            };
            
            window.triggerCommandCenterAnimations();
            
            const observer = new MutationObserver(() => {
              if (window.triggerCommandCenterAnimations) {
                window.triggerCommandCenterAnimations();
              }
            });
            observer.observe(document.body, { childList: true, subtree: true });
          } else {
            setTimeout(initGSAPScrollReveals, 150);
          }
        }
        initGSAPScrollReveals();
      });
    </script>
  </body>
</html>
